<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微信扫码获取 Code</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);padding:40px 32px;width:390px;max-width:100%;text-align:center}
    .title{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:24px}
    .qr-area{width:220px;height:220px;margin:0 auto 16px;border:2px dashed #e0e0e0;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px;transition:border-color .3s;overflow:hidden;background:#fff}
    .qr-area.active{border-color:#52c41a}
    .qr-area img{width:200px;height:200px;display:block}
    .status{font-size:13px;color:#666;margin-bottom:20px;min-height:20px;line-height:1.5}
    .btn-row{display:flex;gap:12px;justify-content:center}
    .btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:#52c41a;color:#fff}.btn-primary:hover:not(:disabled){background:#49b016}
    .btn-outline{background:#fff;color:#666;border:1px solid #d9d9d9}.btn-outline:hover{border-color:#52c41a;color:#52c41a}
    .result-box{margin-top:20px;padding:16px;background:#f6ffed;border:1px solid #b7eb8f;border-radius:10px;display:none}.result-box.show{display:block}
    .label{font-size:12px;color:#52c41a;margin-bottom:8px}.nickname{font-size:14px;color:#333;margin-bottom:8px}
    .code-wrap{display:flex;gap:8px;align-items:center}.code-text{flex:1;background:#fff;border:1px solid #d9d9d9;border-radius:6px;padding:8px 12px;font-size:14px;font-family:"SF Mono","Menlo",monospace;word-break:break-all;text-align:left;color:#1a1a1a;max-height:80px;overflow-y:auto}
    .btn-copy{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:#52c41a;color:#fff;white-space:nowrap}.btn-copy.copied{background:#999}
    .debug{margin-top:16px;text-align:left;font-size:12px;line-height:1.5;color:#999;word-break:break-all;display:none;background:#fafafa;border:1px solid #eee;border-radius:8px;padding:10px}.debug.show{display:block;color:#b00020}
  </style>
</head>
<body>
  <div class="container">
    <h2 class="title">🔐 微信扫码获取 Code</h2>
    <div class="qr-area" id="qrBox">点击下方按钮获取二维码</div>
    <div class="status" id="status">等待操作</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="getQrBtn" onclick="getQRCode()">获取二维码</button>
      <button class="btn btn-outline" id="cancelBtn" onclick="closeAll()">取消</button>
    </div>
    <div class="result-box" id="resultBox">
      <div class="label">✅ 扫码成功</div>
      <div class="nickname" id="nickname"></div>
      <div class="code-wrap">
        <div class="code-text" id="codeText"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyCode()">复制</button>
      </div>
    </div>
    <div class="debug" id="debugBox"></div>
  </div>
<script>
const API='https://www.yx520.ltd/code/code.php';
let pollTimer=null,countDownTimer=null,expireTime=0,currentController=null;
const $=id=>document.getElementById(id);
function debug(msg){const box=$('debugBox');box.textContent=msg;box.classList.add('show');}
function clearDebug(){const box=$('debugBox');box.textContent='';box.classList.remove('show');}
function clearAllTimer(){if(pollTimer)clearInterval(pollTimer);if(countDownTimer)clearInterval(countDownTimer);pollTimer=null;countDownTimer=null;if(currentController)currentController.abort();currentController=null;}
function closeAll(){clearAllTimer();$('status').textContent='已取消';$('resultBox').classList.remove('show');$('getQrBtn').disabled=false;$('getQrBtn').textContent='获取二维码';$('qrBox').classList.remove('active');}
async function fetchJson(url,timeout=12000){currentController=new AbortController();const t=setTimeout(()=>currentController.abort(),timeout);try{const res=await fetch(url,{cache:'no-store',signal:currentController.signal});const text=await res.text();if(!res.ok)throw new Error('HTTP '+res.status+'：'+text.slice(0,160));try{return JSON.parse(text)}catch(e){throw new Error('接口返回的不是 JSON：'+text.slice(0,200));}}finally{clearTimeout(t);currentController=null;}}
function startCountDown(){clearInterval(countDownTimer);expireTime=Date.now()+5*60*1000;countDownTimer=setInterval(()=>{const left=expireTime-Date.now();if(left<=0){clearAllTimer();$('status').textContent='❌ 二维码已过期，请重新获取';$('getQrBtn').disabled=false;$('getQrBtn').textContent='重新获取';$('qrBox').classList.remove('active');return;}const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);$('status').textContent=`✅ 请微信扫码 | ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} 后过期`;},1000);}
async function getQRCode(){const qrBox=$('qrBox'),status=$('status'),btn=$('getQrBtn');btn.disabled=true;btn.textContent='获取中...';status.textContent='正在获取二维码...';clearDebug();clearAllTimer();$('resultBox').classList.remove('show');qrBox.classList.remove('active');qrBox.innerHTML='获取中...';try{const data=await fetchJson(`${API}?action=get_qr&_=${Date.now()}`);if(data.code!==200)throw new Error(data.msg||('接口返回 code='+data.code));const qrData=data&&data.data&&data.data.qr_data;const uuid=data&&data.data&&data.data.uuid;if(!qrData||!uuid)throw new Error('接口返回缺少 qr_data 或 uuid');qrBox.innerHTML='';const img=new Image();img.alt='微信扫码二维码';img.onload=()=>{qrBox.classList.add('active')};img.onerror=()=>{debug('二维码图片生成失败，但接口已返回 qr_data。可能是二维码图片服务被拦截。')};img.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data='+encodeURIComponent(qrData);qrBox.appendChild(img);startCountDown();startCheck(uuid);btn.textContent='已获取';}catch(e){status.textContent='获取二维码失败';debug(String(e&&e.message?e.message:e)+'。常见原因：接口不可访问、证书异常、跨域 CORS 被拦截、网络环境屏蔽 www.yx520.ltd。');btn.disabled=false;btn.textContent='重新获取';qrBox.innerHTML='获取失败';}}
function startCheck(uuid){pollTimer=setInterval(async()=>{try{const data=await fetchJson(`${API}?action=check_qr&uuid=${encodeURIComponent(uuid)}&_=${Date.now()}`,10000);if(data.code===408||Date.now()>expireTime){clearAllTimer();$('status').textContent='❌ 二维码已过期';$('getQrBtn').disabled=false;$('getQrBtn').textContent='重新获取';$('qrBox').classList.remove('active');return;}if(data.code===200){clearAllTimer();$('status').textContent='✅ 扫码成功';await showCode(data.data.wxid,data.data.nickname);}}catch(e){debug('轮询扫码状态失败：'+String(e&&e.message?e.message:e));}},2000);}
async function showCode(wxid,nickname){try{const data=await fetchJson(`${API}?action=login&wxid=${encodeURIComponent(wxid)}&_=${Date.now()}`);if(data.code!==200)throw new Error(data.msg||('接口返回 code='+data.code));const code=data.data.wx_code;$('codeText').textContent=code;$('nickname').textContent=`微信昵称：${nickname||''}`;$('resultBox').classList.add('show');$('getQrBtn').disabled=false;$('getQrBtn').textContent='重新获取';$('copyBtn').textContent='复制';$('copyBtn').classList.remove('copied');}catch(e){$('status').textContent='获取 Code 失败';debug(String(e&&e.message?e.message:e));}}
function copyCode(){const code=$('codeText').textContent;if(!code)return;navigator.clipboard.writeText(code).then(()=>{const btn=$('copyBtn');btn.textContent='已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied')},2000)}).catch(()=>debug('复制失败，请手动选中 Code 复制'))}
</script>
</body>
</html>
