<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员控制台 — QQ 农场挂机</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
        .admin-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .admin-header-left .eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--brand);
            margin: 0 0 6px;
        }
        .admin-header-left h1 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }
        .admin-header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font-ui);
            cursor: pointer;
            border: none;
            transition: background 0.18s, transform 0.12s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-ghost {
            background: transparent;
            color: var(--text-soft);
            border: 1.5px solid var(--line-strong);
        }
        .btn-ghost:hover { background: rgba(0,0,0,0.04); color: var(--text-body); }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover { filter: brightness(1.1); }
        .btn-danger:disabled { opacity: 0.45; cursor: not-allowed; }

        .stats-row {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 130px;
            background: var(--bg-panel-strong);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
        }
        .stat-card .label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            font-family: var(--font-display);
            line-height: 1;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 12px;
        }
        .user-table-wrap {
            background: var(--bg-panel-strong);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        .user-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .user-table th {
            text-align: left;
            padding: 12px 18px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 1px solid var(--line);
            background: rgba(31, 110, 165, 0.03);
        }
        .user-table td {
            padding: 14px 18px;
            color: var(--text-body);
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
        }
        .user-table tr:last-child td {
            border-bottom: none;
        }
        .user-table tr:hover td {
            background: rgba(31, 110, 165, 0.03);
        }
        .username-cell {
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.6;
        }
        .badge-admin {
            background: rgba(31, 110, 165, 0.12);
            color: var(--brand);
        }
        .badge-online {
            background: rgba(56, 161, 105, 0.12);
            color: #2f9e58;
        }
        .badge-running {
            background: rgba(236, 153, 75, 0.15);
            color: #c07a2e;
        }
        .badge-offline {
            background: rgba(0,0,0,0.06);
            color: var(--text-soft);
        }
        .date-cell {
            color: var(--text-soft);
            font-size: 13px;
        }
        .actions-cell {
            text-align: right;
        }
        .btn-del {
            padding: 6px 14px;
            font-size: 13px;
            border-radius: var(--radius-md);
            border: 1.5px solid rgba(178, 73, 60, 0.35);
            background: transparent;
            color: var(--danger);
            font-weight: 700;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s;
        }
        .btn-del:hover { background: rgba(178, 73, 60, 0.08); border-color: var(--danger); }
        .btn-del:disabled { opacity: 0.4; cursor: not-allowed; }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 13.5px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
        }
        .alert.visible { display: block; }
        .alert-error {
            background: rgba(178, 73, 60, 0.1);
            border: 1px solid rgba(178, 73, 60, 0.3);
            color: var(--danger);
        }
        .alert-success {
            background: rgba(56, 161, 105, 0.1);
            border: 1px solid rgba(56, 161, 105, 0.3);
            color: #2f9e58;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-soft);
            font-size: 14px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            background: var(--bg-panel-strong);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            padding: 18px 22px;
            margin-bottom: 20px;
        }
        .setting-info .setting-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }
        .setting-info .setting-desc {
            font-size: 13px;
            color: var(--text-soft);
            line-height: 1.5;
        }
        .toggle-btn {
            flex-shrink: 0;
            width: 52px;
            height: 28px;
            border-radius: 99px;
            border: none;
            cursor: pointer;
            font-size: 0;
            position: relative;
            transition: background 0.2s;
            background: var(--line-strong);
        }
        .toggle-btn::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .toggle-btn.on {
            background: #38a169;
        }
        .toggle-btn.on::after {
            transform: translateX(24px);
        }
        .toggle-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Confirm modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 24px;
        }
        .modal-overlay.visible { display: flex; }
        .modal-card {
            background: var(--bg-panel-strong);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--line);
            padding: 32px 28px 28px;
            width: 100%;
            max-width: 380px;
        }
        .modal-card h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 10px;
        }
        .modal-card p {
            font-size: 14px;
            color: var(--text-body);
            margin: 0 0 24px;
            line-height: 1.6;
        }
        .modal-card p strong {
            color: var(--danger);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <div class="admin-wrap">
        <div class="admin-header">
            <div class="admin-header-left">
                <p class="eyebrow">Admin Console</p>
                <h1>账号管理</h1>
            </div>
            <div class="admin-header-right">
                <span id="currentUser" style="font-size:13px;color:var(--text-soft)"></span>
                <a href="/" class="btn btn-ghost">返回控制台</a>
            </div>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="label">总账号数</div>
                <div class="value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="label">当前在线</div>
                <div class="value" id="statOnline">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Bot 运行中</div>
                <div class="value" id="statRunning">—</div>
            </div>
        </div>

        <div class="setting-row" id="regSettingRow">
            <div class="setting-info">
                <div class="setting-label">允许自由注册</div>
                <div class="setting-desc">关闭后，登录页不再显示注册入口，新用户无法注册账号</div>
            </div>
            <button class="toggle-btn" id="regToggle" onclick="toggleRegistration()" disabled>…</button>
        </div>

        <p class="section-title">所有注册账号</p>
        <div class="user-table-wrap">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>注册时间</th>
                        <th>状态</th>
                        <th style="text-align:right">操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="4"><div class="empty-state">加载中…</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <h2>确认删除账号</h2>
            <p id="confirmText">确定要删除账号 <strong id="confirmUsername"></strong> 吗？此操作不可撤销，该账号的所有数据将被永久删除。</p>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <script>
        let currentUsername = null;
        let pendingDeleteUsername = null;
        let allUsers = [];

        function showAlert(msg, type = 'error') {
            const el = document.getElementById('alertBox');
            el.textContent = msg;
            el.className = `alert alert-${type} visible`;
            setTimeout(() => el.classList.remove('visible'), 5000);
        }

        function formatDate(iso) {
            if (!iso) return '—';
            try {
                const d = new Date(iso);
                return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return iso; }
        }

        function renderTable(users) {
            allUsers = users;
            const tbody = document.getElementById('userTableBody');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">暂无账号</div></td></tr>';
                return;
            }

            const onlineCount = users.filter((u) => u.loggedIn).length;
            const runningCount = users.filter((u) => u.botRunning).length;
            document.getElementById('statTotal').textContent = users.length;
            document.getElementById('statOnline').textContent = onlineCount;
            document.getElementById('statRunning').textContent = runningCount;

            tbody.innerHTML = users.map((u) => {
                const isSelf = u.username === currentUsername;
                const badges = [];
                if (u.isAdmin) badges.push('<span class="badge badge-admin">管理员</span>');
                if (u.loggedIn) badges.push('<span class="badge badge-online">在线</span>');
                if (u.botRunning) badges.push('<span class="badge badge-running">Bot运行</span>');
                if (!u.loggedIn && !u.botRunning) badges.push('<span class="badge badge-offline">离线</span>');

                return `<tr>
                    <td><div class="username-cell">${escHtml(u.username)}${badges.join('')}</div></td>
                    <td class="date-cell">${formatDate(u.createdAt)}</td>
                    <td>${u.botRunning ? '<span style="color:#c07a2e;font-weight:700">运行中</span>' : '<span style="color:var(--text-soft)">未运行</span>'}</td>
                    <td class="actions-cell">
                        <button class="btn-del" ${isSelf ? 'disabled title="不能删除自己"' : ''} onclick="askDelete('${escHtml(u.username)}')">删除</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function escHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        let registrationEnabled = true;

        async function loadSettings() {
            try {
                const res = await fetch('/api/admin/settings');
                if (!res.ok) return;
                const data = await res.json();
                registrationEnabled = !!data.registrationEnabled;
                const btn = document.getElementById('regToggle');
                btn.disabled = false;
                btn.classList.toggle('on', registrationEnabled);
            } catch (e) { /* ignore */ }
        }

        async function toggleRegistration() {
            const btn = document.getElementById('regToggle');
            btn.disabled = true;
            const next = !registrationEnabled;
            try {
                const res = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ registrationEnabled: next }),
                });
                const data = await res.json();
                if (res.ok) {
                    registrationEnabled = !!data.registrationEnabled;
                    btn.classList.toggle('on', registrationEnabled);
                    showAlert(registrationEnabled ? '已开启自由注册' : '已关闭自由注册，新用户将无法注册', registrationEnabled ? 'success' : 'success');
                } else {
                    showAlert(data.error || '操作失败');
                }
            } catch (e) {
                showAlert('网络错误：' + e.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (res.status === 401) { window.location.href = '/login'; return; }
                if (res.status === 403) { window.location.href = '/'; return; }
                if (!res.ok) throw new Error('请求失败');
                const data = await res.json();
                renderTable(data.users || []);
            } catch (e) {
                showAlert('加载用户列表失败：' + e.message);
            }
        }

        function askDelete(username) {
            pendingDeleteUsername = username;
            document.getElementById('confirmUsername').textContent = username;
            document.getElementById('confirmModal').classList.add('visible');
        }

        function closeModal() {
            pendingDeleteUsername = null;
            document.getElementById('confirmModal').classList.remove('visible');
        }

        async function confirmDelete() {
            if (!pendingDeleteUsername) return;
            const username = pendingDeleteUsername;
            const btn = document.getElementById('confirmDeleteBtn');
            btn.disabled = true;
            btn.textContent = '删除中…';
            try {
                const res = await fetch(`/api/admin/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) {
                    closeModal();
                    showAlert(`账号 ${username} 已成功删除`, 'success');
                    loadUsers();
                } else {
                    showAlert(data.error || '删除失败');
                    closeModal();
                }
            } catch (e) {
                showAlert('网络错误：' + e.message);
                closeModal();
            } finally {
                btn.disabled = false;
                btn.textContent = '确认删除';
            }
        }

        // Close modal on overlay click
        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Init: verify admin
        (async () => {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/login'; return; }
                const me = await res.json();
                if (!me.isAdmin) { window.location.href = '/'; return; }
                currentUsername = me.username;
                document.getElementById('currentUser').textContent = `👤 ${me.username}`;
                loadSettings();
                loadUsers();
            } catch (e) {
                window.location.href = '/login';
            }
        })();
    </script>
</body>
</html>
